<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MusicWave — Messaggi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="shared.css" />
<style>
body { overflow: hidden; }

.messages-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 66px);
  position: relative; z-index: 1;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.msg-sidebar {
  background: var(--navy-800);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-top-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.sidebar-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; }
.new-msg-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,196,180,.12); border: 1px solid rgba(0,196,180,.25);
  color: var(--teal); font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: all var(--trans);
}
.new-msg-btn:hover { background: rgba(0,196,180,.2); }

.search-box {
  position: relative;
}
.search-box input {
  width: 100%; padding: 8px 14px 8px 34px;
  background: rgba(14,30,48,.8); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: .82rem; outline: none; transition: border-color var(--trans);
}
.search-box input:focus { border-color: var(--teal); }
.search-box input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: .8rem; pointer-events: none;
}

.convo-list { flex: 1; overflow-y: auto; }

.convo-item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 13px 20px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background var(--trans); position: relative;
}
.convo-item:hover { background: rgba(255,255,255,.03); }
.convo-item.active {
  background: rgba(0,196,180,.06);
  border-left: 3px solid var(--teal);
  padding-left: 17px;
}
.convo-av { flex-shrink: 0; position: relative; }
.online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 9px; height: 9px; border-radius: 50%;
  background: #4ADE80; border: 2px solid var(--navy-800);
}
.convo-info { flex: 1; min-width: 0; }
.convo-name { font-size: .87rem; font-weight: 600; margin-bottom: 2px; }
.convo-preview {
  font-size: .77rem; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.convo-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0;
}
.convo-time { font-size: .68rem; color: var(--text-dim); }
.unread-badge {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--teal); color: var(--navy-900);
  font-size: .62rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}

/* ── CHAT AREA ───────────────────────────────────────────── */
.chat-area {
  display: flex; flex-direction: column;
  background: var(--navy-900);
}

.chat-header {
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
.chat-header-info { flex: 1; }
.chat-header-name { font-weight: 700; font-size: .98rem; margin-bottom: 1px; }
.chat-header-status { font-size: .74rem; color: #4ADE80; }
.chat-header-status.offline { color: var(--text-dim); }

.chat-header-actions { display: flex; gap: 6px; }
.chat-action {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  font-size: .9rem; display: flex; align-items: center; justify-content: center;
  transition: all var(--trans);
}
.chat-action:hover { background: rgba(255,255,255,.1); }

.chat-body {
  flex: 1; overflow-y: auto;
  padding: 24px; display: flex; flex-direction: column; gap: 18px;
}

.date-pill {
  text-align: center; font-size: .7rem; color: var(--text-dim);
  font-family: 'Space Mono', monospace; letter-spacing: .05em;
}

.msg-row { display: flex; gap: 9px; align-items: flex-end; }
.msg-row.me { flex-direction: row-reverse; }

.msg-bubble {
  max-width: 62%; padding: 10px 15px; word-break: break-word;
  font-size: .875rem; line-height: 1.52;
}
.msg-row:not(.me) .msg-bubble {
  background: rgba(14,30,48,.9); border: 1px solid var(--border);
  border-radius: 18px 18px 18px 4px;
}
.msg-row.me .msg-bubble {
  background: linear-gradient(135deg, var(--teal-dk), rgba(0,196,180,.85));
  color: #fff; border-radius: 18px 18px 4px 18px;
}
.msg-time {
  font-size: .65rem; color: var(--text-dim);
  padding-bottom: 3px; white-space: nowrap;
}

/* Album share bubble */
.album-share-bubble {
  max-width: 260px; border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border); background: rgba(8,20,34,.95);
}
.msg-row.me .album-share-bubble {
  border-color: rgba(0,196,180,.3);
}
.asb-header { display: flex; gap: 10px; padding: 12px 14px; }
.asb-emoji {
  width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
  background: var(--navy-600); display: flex; align-items: center;
  justify-content: center; font-size: 1.4rem;
}
.asb-info .title { font-size: .84rem; font-weight: 700; }
.asb-info .artist { font-size: .73rem; color: var(--text-muted); }
.asb-footer {
  padding: 8px 14px; border-top: 1px solid var(--border);
  font-size: .72rem; color: var(--teal); font-weight: 600;
}

.typing-indicator {
  display: flex; align-items: center; gap: 4px; padding: 2px 0;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
  animation: bounce .9s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: .16s; }
.typing-dot:nth-child(3) { animation-delay: .32s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0) } 40% { transform:translateY(-5px) } }

/* Input */
.chat-input-area {
  padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 10px; align-items: flex-end;
}
.input-attachments { display: flex; gap: 4px; }
.att-btn {
  width: 36px; height: 36px; border-radius: 50%;
  color: var(--text-muted); font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: color var(--trans);
}
.att-btn:hover { color: var(--text); }

.chat-input-wrap { flex: 1; position: relative; }
.chat-input {
  width: 100%; padding: 11px 48px 11px 16px;
  background: rgba(14,30,48,.8); border: 1px solid var(--border);
  border-radius: 24px; color: var(--text); font-size: .875rem; outline: none;
  transition: border-color var(--trans); resize: none; max-height: 120px;
}
.chat-input:focus { border-color: var(--teal); }
.chat-input::placeholder { color: var(--text-dim); }

.send-btn {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--teal-dk), var(--teal));
  color: #fff; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 14px rgba(0,196,180,.28); transition: all var(--trans);
}
.send-btn:hover { transform: scale(1.06); box-shadow: 0 5px 20px rgba(0,196,180,.4); }

/* No chat selected state */
.no-chat {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: var(--text-muted);
}
.no-chat-icon { font-size: 3.5rem; }
.no-chat h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text); }
.no-chat p { font-size: .875rem; max-width: 280px; text-align: center; line-height: 1.6; }

@media (max-width: 760px) {
  body { overflow: auto; }
  .messages-layout { grid-template-columns: 1fr; height: auto; }
  .msg-sidebar { height: 340px; }
  .chat-area { height: 500px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">
    <div class="brand-mark">♪</div>
    <span class="brand-name">Music<b>Wave</b></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">🏠 Home</a></li>
    <li><a href="seguiti.html">👥 Seguiti</a></li>
    <li><a href="messaggi.html" class="active">💬 Messaggi</a></li>
  </ul>
  <div class="nav-right">
    <a href="recensione.html" class="btn btn-gold">＋ Recensisci</a>
    <a href="profilo.html" class="avatar" style="width:36px;height:36px;font-size:.85rem;text-decoration:none;">M</a>
  </div>
</nav>

<div class="messages-layout">

  <!-- SIDEBAR -->
  <aside class="msg-sidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-row">
        <span class="sidebar-title">Messaggi</span>
        <button class="new-msg-btn" title="Nuovo messaggio">✏</button>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Cerca conversazioni…" oninput="searchConvos(this.value)" />
      </div>
    </div>
    <div class="convo-list" id="convo-list"></div>
  </aside>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
    <div class="no-chat" id="no-chat">
      <div class="no-chat-icon">💬</div>
      <h2>I tuoi messaggi</h2>
      <p>Seleziona una conversazione per iniziare a chattare con i tuoi seguiti.</p>
    </div>

    <div id="chat-main" style="display:none;flex-direction:column;height:100%;overflow:hidden;display:none;flex:1;">
      <div class="chat-header" id="chat-header"></div>
      <div class="chat-body" id="chat-body"></div>
      <div class="chat-input-area">
        <div class="input-attachments">
          <button class="att-btn" title="Condividi album" onclick="shareAlbum()">🎵</button>
          <button class="att-btn" title="Emoji">😊</button>
        </div>
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chat-input" placeholder="Scrivi un messaggio…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CONTACTS = [
  { id:1, name:"Laura Russo", av:"L", online:true, unread:2, time:"12:42",
    preview:"Hai sentito il nuovo album di Radiohead?",
    messages: [
      { from:"them", text:"Ehi! Hai già ascoltato il nuovo album di Radiohead?", time:"12:30" },
      { from:"me",   text:"Non ancora, ma ho visto le recensioni. Sembra interessante!", time:"12:31" },
      { from:"them", text:"Devi assolutamente ascoltarlo, è fantastico. Molto diverso dai precedenti però.", time:"12:32" },
      { from:"me",   text:"Ok mi fido di te! Lo ascolto stasera. Tu che rating gli daresti?", time:"12:35" },
      { from:"them", text:"Almeno 4.5/5 direi. La produzione è incredibile.", time:"12:42" },
    ]
  },
  { id:2, name:"Giovanni C.", av:"G", online:false, unread:0, time:"Ieri",
    preview:"Concordo sulla recensione di Miles Davis!",
    messages: [
      { from:"them", text:"Ho letto la tua recensione di Kind of Blue! Concordo al 100%.", time:"Ieri 18:15" },
      { from:"me",   text:"Grazie! È un album che non smette mai di sorprendere.", time:"Ieri 18:22" },
      { from:"them", text:"Hai mai sentito 'Bitches Brew'? È ancora più sperimentale.", time:"Ieri 18:30" },
      { from:"me",   text:"Sì, è incredibile. Jazz fusion al suo massimo livello.", time:"Ieri 18:45" },
      { from:"them", text:"Concordo sulla recensione di Miles Davis!", time:"Ieri 19:00" },
    ]
  },
  { id:3, name:"Sara Monti", av:"S", online:true, unread:1, time:"Lun",
    preview:"Ciao! Segui anche tu Kendrick?",
    messages: [
      { from:"them", text:"Ciao! Segui anche tu Kendrick?", time:"Lun 14:00" },
      { from:"me",   text:"Assolutamente sì! TPAB è un capolavoro.", time:"Lun 14:05" },
      { type:"album", from:"them", emoji:"🦋", title:"To Pimp a Butterfly", artist:"Kendrick Lamar", time:"Lun 14:07" },
      { from:"them", text:"Ecco il link alla mia recensione su MusicWave!", time:"Lun 14:07" },
    ]
  },
  { id:4, name:"Alex Terzi", av:"A", online:false, unread:0, time:"Dom",
    preview:"Bella recensione di Daft Punk 👌",
    messages: [
      { from:"them", text:"Bella recensione di Daft Punk 👌", time:"Dom 20:10" },
      { from:"me",   text:"Grazie! Random Access Memories è underrated secondo me.", time:"Dom 20:15" },
    ]
  },
];

let activeContact = null;

(function init() {
  renderConvoList(CONTACTS);
})();

function renderConvoList(contacts) {
  document.getElementById('convo-list').innerHTML = contacts.map(c => `
    <div class="convo-item${activeContact===c.id?' active':''}" onclick="openChat(${c.id})">
      <div class="convo-av">
        <div class="avatar" style="width:42px;height:42px;font-size:.95rem;">${c.av}</div>
        ${c.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="convo-info">
        <div class="convo-name">${c.name}</div>
        <div class="convo-preview">${c.preview}</div>
      </div>
      <div class="convo-meta">
        <span class="convo-time">${c.time}</span>
        ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
      </div>
    </div>`).join('');
}

function openChat(id) {
  activeContact = id;
  const c = CONTACTS.find(x => x.id === id);
  c.unread = 0;
  renderConvoList(CONTACTS);

  document.getElementById('no-chat').style.display = 'none';
  const cm = document.getElementById('chat-main');
  cm.style.display = 'flex'; cm.style.flexDirection = 'column';

  // Header
  document.getElementById('chat-header').innerHTML = `
    <div class="avatar" style="width:40px;height:40px;font-size:.95rem;position:relative;">
      ${c.av}
      ${c.online ? '<div class="online-dot" style="border-color:var(--navy-900)"></div>' : ''}
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name">${c.name}</div>
      <div class="chat-header-status${c.online?'':' offline'}">${c.online ? '● Online' : '● Offline'}</div>
    </div>
    <div class="chat-header-actions">
      <button class="chat-action" title="Cerca">🔍</button>
      <button class="chat-action" title="Profilo utente">👤</button>
    </div>`;

  renderMessages(c);
}

function renderMessages(c) {
  const body = document.getElementById('chat-body');
  body.innerHTML = '<div class="date-pill">Oggi</div>' +
    c.messages.map(m => {
      if (m.type === 'album') {
        return `<div class="msg-row${m.from==='me'?' me':''}">
          ${m.from==='them' ? `<div class="avatar" style="width:30px;height:30px;font-size:.72rem;">${c.av}</div>` : ''}
          <div>
            <div class="album-share-bubble">
              <div class="asb-header">
                <div class="asb-emoji">${m.emoji}</div>
                <div class="asb-info">
                  <div class="title">${m.title}</div>
                  <div class="artist">${m.artist}</div>
                </div>
              </div>
              <div class="asb-footer">🎵 Condiviso su MusicWave</div>
            </div>
            <div class="msg-time" style="text-align:${m.from==='me'?'right':'left'}">${m.time}</div>
          </div>
        </div>`;
      }
      return `<div class="msg-row${m.from==='me'?' me':''}">
        ${m.from==='them' ? `<div class="avatar" style="width:30px;height:30px;font-size:.72rem;flex-shrink:0;">${c.av}</div>` : ''}
        <div>
          <div class="msg-bubble">${m.text}</div>
          <div class="msg-time" style="text-align:${m.from==='me'?'right':'left'}">${m.time}</div>
        </div>
      </div>`;
    }).join('');

  // Typing indicator if online
  if (c.online) {
    body.innerHTML += `<div class="msg-row">
      <div class="avatar" style="width:30px;height:30px;font-size:.72rem;">${c.av}</div>
      <div class="msg-bubble" style="padding:12px 16px;">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>
    </div>`;
  }

  body.scrollTop = body.scrollHeight;
}

function sendMsg() {
  if (activeContact === null) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const c = CONTACTS.find(x => x.id === activeContact);
  const now = new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
  c.messages.push({ from:'me', text, time: now });
  c.preview = text;
  input.value = ''; input.style.height = 'auto';
  renderMessages(c);
  renderConvoList(CONTACTS);
}

function shareAlbum() {
  if (activeContact === null) { showToast('Seleziona prima una conversazione'); return; }
  const c = CONTACTS.find(x => x.id === activeContact);
  const now = new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
  c.messages.push({ type:'album', from:'me', emoji:'🤖', title:'OK Computer', artist:'Radiohead', time: now });
  renderMessages(c);
  showToast('Album condiviso!');
}

function searchConvos(query) {
  const filtered = CONTACTS.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
  renderConvoList(filtered);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
