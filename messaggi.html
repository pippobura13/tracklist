<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hive Music — Messaggi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="shared.css" />
<style>
body { overflow: hidden; }

.messages-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 64px);
}

/* ── Sidebar ─────────────────────────────────── */
.msg-sidebar {
  background: var(--hive-800);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-top {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 12px; display: block;
}
.search-box { position: relative; }
.search-box input {
  width: 100%; padding: 9px 14px 9px 34px;
  background: rgba(0,0,0,.25); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text);
  font-size: .82rem; outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--honey); }
.search-box input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); font-size: .75rem; pointer-events: none;
}
.convo-list { flex: 1; overflow-y: auto; }
.convo-item {
  display: flex; align-items: center; gap: 11px;
  padding: 12px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.convo-item:hover { background: rgba(255,255,255,.03); }
.convo-item.active {
  background: rgba(245,166,35,.07);
  border-left: 3px solid var(--honey);
  padding-left: 13px;
}
.convo-av { flex-shrink: 0; }
.convo-info { flex: 1; min-width: 0; }
.convo-name { font-size: .87rem; font-weight: 600; margin-bottom: 2px; }
.convo-preview {
  font-size: .76rem; color: #a89f8f;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.convo-time { font-size: .67rem; color: var(--text-dim); }
.unread-badge {
  min-width: 18px; height: 18px; border-radius: 9px;
  background: var(--honey); color: var(--hive-950);
  font-size: .6rem; font-weight: 800; padding: 0 5px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Chat area ───────────────────────────────── */
.chat-area { display: flex; flex-direction: column; background: var(--hive-900); overflow: hidden; }

.chat-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.chat-header-info { flex: 1; }
.chat-header-name { font-weight: 700; font-size: .95rem; }
.chat-header-sub  { font-size: .72rem; color: var(--text-dim); margin-top: 1px; }
.chat-action {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .85rem; transition: background .15s;
}
.chat-action:hover { background: rgba(245,166,35,.1); }

.chat-body {
  flex: 1; overflow-y: auto;
  padding: 20px; display: flex; flex-direction: column; gap: 4px;
}
.date-pill {
  text-align: center; font-size: .69rem; color: var(--text-dim);
  margin: 10px 0 6px; letter-spacing: .04em;
}
.msg-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 2px; }
.msg-row.me { flex-direction: row-reverse; }
.msg-group {
  display: flex; flex-direction: column;
  max-width: min(65%, 520px); min-width: 0;
}
.msg-row.me       .msg-group { align-items: flex-end; }
.msg-row:not(.me) .msg-group { align-items: flex-start; }
.msg-bubble {
  max-width: 100%; width: fit-content; padding: 10px 14px;
  font-size: .875rem; line-height: 1.5;
  overflow-wrap: anywhere; word-break: break-word; white-space: pre-wrap;
}
.msg-row:not(.me) .msg-bubble {
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 18px 18px 18px 4px;
}
.msg-row.me .msg-bubble {
  background: linear-gradient(145deg, var(--honey-dk), var(--honey));
  color: var(--hive-950); font-weight: 500;
  border-radius: 18px 18px 4px 18px;
}
.msg-meta {
  font-size: .63rem; color: var(--text-dim); padding-bottom: 2px;
  white-space: nowrap; margin-top: 2px;
}

.chat-input-area {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.chat-input {
  flex: 1; padding: 11px 16px;
  background: rgba(0,0,0,.25); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); font-size: .875rem;
  outline: none; resize: none; max-height: 120px;
  transition: border-color .2s; font-family: inherit;
}
.chat-input:focus { border-color: var(--honey); }
.chat-input::placeholder { color: var(--text-dim); }
.send-btn {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(145deg, var(--honey-dk), var(--honey));
  color: var(--hive-950); font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(245,166,35,.3);
  transition: transform .15s, box-shadow .15s; cursor: pointer; border: none;
}
.send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(245,166,35,.4); }

.no-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text-muted);
}
.no-chat-icon { font-size: 3.5rem; }
.no-chat h2 { font-family: 'Fraunces', serif; font-size: 1.15rem; color: var(--text); }
.no-chat p { font-size: .85rem; max-width: 280px; text-align: center; line-height: 1.6; }

@media (max-width: 760px) {
  body { overflow: auto; }
  .messages-layout { grid-template-columns: 1fr; height: auto; }
  .msg-sidebar { height: 320px; }
  .chat-area { height: 480px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">
    <div class="brand-mark">🐝</div>
    <span class="brand-name">Hive <b>Music</b></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">🏠 Home</a></li>
    <li><a href="seguiti.html">👥 Seguiti</a></li>
    <li><a href="messaggi.html" class="active">💬 Messaggi</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="messages-layout">

  <!-- Sidebar -->
  <aside class="msg-sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">Messaggi</span>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Cerca o inizia nuova chat…"
          oninput="onSearch(this.value)" autocomplete="off" />
      </div>
    </div>
    <div class="convo-list" id="convo-list">
      <div style="padding:24px 16px;text-align:center;color:#6b6358;font-size:.82rem">
        Caricamento…
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <!-- Stato: nessuna chat selezionata -->
    <div class="no-chat" id="no-chat">
      <div class="no-chat-icon">🐝</div>
      <h2>I tuoi messaggi</h2>
      <p>Seleziona un contatto dalla lista oppure cerca un utente per iniziare.</p>
    </div>

    <!-- Chat attiva (nascosta finché non si apre) -->
    <div id="chat-main" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="chat-header" id="chat-header"></div>
      <div class="chat-body"   id="chat-body"></div>
      <div class="chat-input-area">
        <textarea id="chat-input" class="chat-input" rows="1"
          placeholder="Scrivi un messaggio…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="api.js?v=8"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════
   STATO GLOBALE
═══════════════════════════════════════════════ */
let me           = null;   // utente loggato
let contacts     = [];     // lista sidebar (seguiti + chi ci ha scritto)
let activeId     = null;   // id utente chat aperta
let pollTimer    = null;
let lastMsgAt    = null;   // ISO ultimo msg renderizzato (per poll incrementale)
let lastDateKey  = null;   // YYYY-MM-DD ultimo separatore data
let searchQuery  = '';     // query ricerca attiva

/* ═══════════════════════════════════════════════
   AVVIO
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.isLoggedIn()) { location.href = 'accedi.html'; return; }

  try { me = await Auth.me(); }
  catch { Auth.logout(); return; }

  /* navbar */
  document.getElementById('nav-right').innerHTML = `
    <a href="recensione.html" class="btn btn-gold">＋ Recensisci</a>
    <a href="profilo.html" class="avatar"
       style="width:36px;height:36px;font-size:.85rem;text-decoration:none;overflow:hidden;">${avatarInner(me)}</a>`;

  /* carica contatti e avvia polling */
  await loadContacts();
  startPolling();

  /* apertura automatica da ?user=ID (link da profilo) */
  const uid = parseInt(new URLSearchParams(location.search).get('user'));
  if (uid > 0) openChat(uid);
});

/* ═══════════════════════════════════════════════
   SIDEBAR — caricamento e render
═══════════════════════════════════════════════ */
async function loadContacts() {
  const [followRes, convoRes] = await Promise.all([
    Users.following().catch(() => ({ users: [] })),
    Messages.conversations().catch(() => ({ conversations: [] }))
  ]);

  const followed = followRes.users   || [];
  const convos   = convoRes.conversations || [];

  /* mappa conversazioni per id utente */
  const convoMap = new Map(convos.map(c => [c.user.id, c]));
  const seen     = new Set();
  const list     = [];

  /* prima i seguiti, con dati conversazione se disponibili */
  for (const u of followed) {
    seen.add(u.id);
    const c = convoMap.get(u.id);
    list.push(c ?? { user: u, last_message: null, unread_count: 0 });
  }

  /* poi chiunque ci abbia scritto ma non seguiamo */
  for (const c of convos) {
    if (!seen.has(c.user.id)) list.push(c);
  }

  /* ordinamento: chi ha messaggi per data, poi alfabetico */
  list.sort((a, b) => {
    if (a.last_message && b.last_message)
      return new Date(b.last_message.created_at) - new Date(a.last_message.created_at);
    if (a.last_message) return -1;
    if (b.last_message) return  1;
    return (a.user.display_name || a.user.username || '')
      .localeCompare(b.user.display_name || b.user.username || '');
  });

  contacts = list;
  renderSidebar(contacts);
}

function renderSidebar(list) {
  const el = document.getElementById('convo-list');

  if (!list.length) {
    el.innerHTML = `
      <div style="padding:32px 16px;text-align:center">
        <div style="font-size:2rem;margin-bottom:10px">💬</div>
        <p style="color:#a89f8f;font-size:.83rem;line-height:1.65;margin-bottom:18px">
          Non segui ancora nessuno.<br>Cerca un utente qui sopra.
        </p>
        <a href="seguiti.html"
           style="display:inline-block;padding:8px 18px;border-radius:999px;
                  background:rgba(245,166,35,.12);color:#f5a623;
                  font-size:.8rem;font-weight:600;text-decoration:none;
                  border:1px solid rgba(245,166,35,.25)">
          👥 Esplora utenti
        </a>
      </div>`;
    return;
  }

  el.innerHTML = list.map(c => {
    const u       = c.user;
    const preview = c.last_message
      ? esc(c.last_message.body)
      : '<i style="color:#6b6358">Inizia la conversazione</i>';
    const time    = c.last_message ? fmtDate(c.last_message.created_at) : '';

    return `
      <div class="convo-item${activeId === u.id ? ' active' : ''}"
           onclick="openChat(${u.id})">
        <div class="convo-av">
          <a href="profilo.html?id=${u.id}" onclick="event.stopPropagation()"
             class="avatar"
             style="width:44px;height:44px;font-size:.95rem;overflow:hidden;text-decoration:none;">${avatarInner(u)}</a>
        </div>
        <div class="convo-info">
          <a class="convo-name" href="profilo.html?id=${u.id}"
             onclick="event.stopPropagation()"
             style="text-decoration:none;color:inherit;">${esc(u.display_name || u.username)}</a>
          <div class="convo-preview">${preview}</div>
        </div>
        <div class="convo-meta">
          ${time ? `<span class="convo-time">${time}</span>` : ''}
          ${c.unread_count ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   RICERCA (locale + piattaforma)
═══════════════════════════════════════════════ */
let _searchTimer = null;

function onSearch(q) {
  searchQuery = q;
  clearTimeout(_searchTimer);

  if (!q) { renderSidebar(contacts); return; }

  const low   = q.toLowerCase();
  const local = contacts.filter(c =>
    (c.user.display_name || c.user.username || '').toLowerCase().includes(low)
  );
  renderSidebar(local);

  if (q.length < 2) return;

  _searchTimer = setTimeout(async () => {
    try {
      const { users } = await Users.search(q);
      const ids = new Set(local.map(c => c.user.id));
      if (me) ids.add(me.id);
      const extra = users
        .filter(u => !ids.has(u.id))
        .map(u => ({ user: u, last_message: null, unread_count: 0 }));
      if (extra.length) renderSidebar([...local, ...extra]);
    } catch { /* silenzioso */ }
  }, 350);
}

/* ═══════════════════════════════════════════════
   APRI CHAT
═══════════════════════════════════════════════ */
async function openChat(userId) {
  userId   = parseInt(userId);
  activeId = userId;
  lastMsgAt   = null;
  lastDateKey = null;

  /* trova o scarica i dati dell'utente */
  let entry = contacts.find(c => c.user.id === userId);
  if (!entry) {
    let u;
    try   { u = await Users.get(userId); }
    catch { u = { id: userId, username: '…', display_name: '…', online: false }; }
    entry = { user: u, last_message: null, unread_count: 0 };
    contacts = [entry, ...contacts];
  }

  /* aggiorna sidebar (evidenzia attivo) */
  if (!searchQuery) renderSidebar(contacts);

  const u  = entry.user;

  /* mostra area chat */
  document.getElementById('no-chat').style.display  = 'none';
  const cm = document.getElementById('chat-main');
  cm.style.display        = 'flex';
  cm.style.flexDirection  = 'column';
  cm.style.flex           = '1';
  cm.style.overflow       = 'hidden';

  /* header */
  document.getElementById('chat-header').innerHTML = `
    <a href="profilo.html?id=${u.id}" class="avatar"
       style="width:42px;height:42px;font-size:.95rem;overflow:hidden;text-decoration:none;">${avatarInner(u)}</a>
    <div class="chat-header-info">
      <a href="profilo.html?id=${u.id}" class="chat-header-name"
         style="text-decoration:none;color:inherit;">${esc(u.display_name || u.username)}</a>
      <div class="chat-header-sub">@${esc(u.username || '')}</div>
    </div>
    <button class="chat-action" onclick="location.href='profilo.html?id=${u.id}'"
            title="Vai al profilo">👤</button>`;

  /* segna come letti e carica messaggi */
  entry.unread_count = 0;
  Messages.markRead(userId).catch(() => {});
  await loadMessages(userId);

  /* focus sull'input */
  document.getElementById('chat-input').focus();
}

/* ═══════════════════════════════════════════════
   CARICA E RENDERIZZA MESSAGGI
═══════════════════════════════════════════════ */
async function loadMessages(userId) {
  const body = document.getElementById('chat-body');
  body.innerHTML = `<div style="color:#6b6358;font-size:.8rem;text-align:center;padding:24px">
    Caricamento…</div>`;
  try {
    const { messages } = await Messages.list(userId);
    renderMessages(messages || []);
  } catch (e) {
    body.innerHTML = `<div style="color:#e57373;font-size:.8rem;text-align:center;padding:24px">
      Errore: ${esc(e.message)}</div>`;
  }
}

function renderMessages(msgs) {
  const body = document.getElementById('chat-body');
  lastMsgAt   = null;
  lastDateKey = null;

  if (!msgs.length) {
    body.innerHTML = `<div style="color:#6b6358;font-size:.82rem;text-align:center;padding:40px">
      Nessun messaggio ancora — scrivi qualcosa! 👋</div>`;
    return;
  }

  body.innerHTML = msgs.map(m => {
    const html = buildMsgHTML(m);
    if (m.created_at > (lastMsgAt ?? '')) lastMsgAt = m.created_at;
    return html;
  }).join('');

  body.scrollTop = body.scrollHeight;
}

function buildMsgHTML(m) {
  const isMe   = m.sender_id === me?.id;
  const dk     = m.created_at.slice(0, 10);
  let   out    = '';

  /* separatore data */
  if (dk !== lastDateKey) {
    out += `<div class="date-pill">${fmtDateSep(m.created_at)}</div>`;
    lastDateKey = dk;
  }

  /* avatar mittente (solo messaggi ricevuti) */
  const sender  = contacts.find(c => c.user.id === m.sender_id);
  const senderU = sender ? sender.user : { username: '?', display_name: '?' };

  if (isMe) {
    out += `
      <div class="msg-row me">
        <div class="msg-group">
          <div class="msg-bubble">${esc(m.body)}</div>
          <div class="msg-meta">${fmtTime(m.created_at)}${m.read_at ? ' ✓✓' : ''}</div>
        </div>
      </div>`;
  } else {
    out += `
      <div class="msg-row">
        <a href="profilo.html?id=${m.sender_id}" class="avatar"
           style="width:28px;height:28px;font-size:.7rem;flex-shrink:0;overflow:hidden;text-decoration:none;">${avatarInner(senderU)}</a>
        <div class="msg-group">
          <div class="msg-bubble">${esc(m.body)}</div>
          <div class="msg-meta">${fmtTime(m.created_at)}</div>
        </div>
      </div>`;
  }
  return out;
}

/* ═══════════════════════════════════════════════
   INVIO MESSAGGIO
═══════════════════════════════════════════════ */
async function sendMsg() {
  if (!activeId) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value        = '';
  input.style.height = 'auto';

  const body  = document.getElementById('chat-body');
  const now   = new Date().toISOString();
  const tmpId = 'tmp' + Date.now();
  const dk    = now.slice(0, 10);

  /* separatore data ottimistico */
  if (dk !== lastDateKey) {
    body.insertAdjacentHTML('beforeend',
      `<div class="date-pill">${fmtDateSep(now)}</div>`);
    lastDateKey = dk;
  }

  /* bolla ottimistica */
  body.insertAdjacentHTML('beforeend', `
    <div class="msg-row me" id="${tmpId}">
      <div class="msg-group">
        <div class="msg-bubble">${esc(text)}</div>
        <div class="msg-meta">${fmtTime(now)} ⏳</div>
      </div>
    </div>`);
  body.scrollTop = body.scrollHeight;

  try {
    const msg = await Messages.send(activeId, text);

    /* aggiorna bolla con timestamp reale */
    const el = document.getElementById(tmpId);
    if (el) {
      el.querySelector('.msg-meta').textContent = fmtTime(msg.created_at);
      el.removeAttribute('id');
    }
    lastMsgAt = msg.created_at;

    /* aggiorna anteprima sidebar */
    const entry = contacts.find(c => c.user.id === activeId);
    if (entry) {
      entry.last_message = { body: text, created_at: msg.created_at };
      if (!searchQuery) renderSidebar(contacts);
    }
  } catch (e) {
    document.getElementById(tmpId)?.remove();
    input.value = text;
    showToast('Errore invio: ' + e.message);
  }
}

/* ═══════════════════════════════════════════════
   POLLING (ogni 4s)
═══════════════════════════════════════════════ */
function startPolling() {
  pollTimer = setInterval(async () => {

    /* aggiorna dati sidebar */
    try {
      const { conversations: convos } = await Messages.conversations();
      const map = new Map((convos || []).map(c => [c.user.id, c]));
      for (const entry of contacts) {
        const c = map.get(entry.user.id);
        if (!c) continue;
        entry.last_message = c.last_message;
        if (entry.user.id !== activeId) entry.unread_count = c.unread_count;
      }
      if (!searchQuery) renderSidebar(contacts);
    } catch { /* ignora errori di rete */ }

    /* nuovi messaggi nella chat aperta */
    if (activeId && lastMsgAt) {
      try {
        const { messages } = await Messages.list(activeId, lastMsgAt);
        if (!messages?.length) return;

        const body     = document.getElementById('chat-body');
        const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;

        for (const m of messages) {
          body.insertAdjacentHTML('beforeend', buildMsgHTML(m));
          lastMsgAt = m.created_at;
        }

        if (atBottom) body.scrollTop = body.scrollHeight;
        Messages.markRead(activeId).catch(() => {});

        /* togli badge non letti per questa chat */
        const entry = contacts.find(c => c.user.id === activeId);
        if (entry) { entry.unread_count = 0; }
        if (!searchQuery) renderSidebar(contacts);
      } catch { /* ignora */ }
    }

  }, 4000);
}

/* ═══════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════ */
function fmtDate(iso) {
  if (!iso) return '';
  const d    = new Date(iso);
  const now  = new Date();
  const tod  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yes  = new Date(tod - 864e5);
  const day  = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (day >= tod) return d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
  if (day >= yes) return 'Ieri';
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'short' }).replace('.', '');
}

function fmtDateSep(iso) {
  if (!iso) return '';
  const d    = new Date(iso);
  const now  = new Date();
  const tod  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yes  = new Date(tod - 864e5);
  const day  = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (day >= tod) return 'Oggi';
  if (day >= yes) return 'Ieri';
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'long' });
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

window.addEventListener('beforeunload', () => clearInterval(pollTimer));
</script>
