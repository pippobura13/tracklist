<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hive Music — Seguiti</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="shared.css" />
<style>
/* ── Page Header ─────────────────────────────────────────── */
.page-header { padding: 48px 0 0; margin-bottom: 36px; }
.page-header-inner {
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.page-sub {
  color: var(--text-muted); font-size: .86rem; margin-top: 7px;
  letter-spacing: 0.01em;
}

/* ── Layout ──────────────────────────────────────────────── */
.following-layout {
  display: grid; grid-template-columns: 1fr 300px; gap: 40px; align-items: start;
}
.reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ── Empty State ─────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 30px;
  background: var(--card-bg);
  border: 1px dashed var(--border-md);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
}
/* Subtle glow top-center */
.empty-state::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 120px;
  background: radial-gradient(ellipse, rgba(245,166,35,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.empty-icon { font-size: 3.6rem; margin-bottom: 18px; display: block; }
.empty-title {
  font-family: 'Fraunces', serif;
  font-size: 1.35rem; font-weight: 700; margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.empty-text {
  color: var(--text-muted); line-height: 1.7; max-width: 300px;
  margin: 0 auto 24px; font-size: .87rem;
}

/* ── Sidebar Card ────────────────────────────────────────── */
.sidebar-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: sticky; top: 86px;
  /* Top highlight */
  box-shadow: inset 0 1px 0 rgba(245,166,35,0.07);
}
.sidebar-card-head {
  padding: 18px 20px 15px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(245,166,35,0.025);
}
.sidebar-card-title {
  font-family: 'Fraunces', serif; font-size: .97rem; font-weight: 700;
  letter-spacing: -0.01em;
}
.see-all {
  font-size: .74rem; color: var(--honey); font-weight: 600;
  transition: color var(--trans);
}
.see-all:hover { color: var(--honey-lt); }

/* ── Suggestion User Items ───────────────────────────────── */
.user-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  transition: background var(--trans);
}
.user-item:last-child { border-bottom: none; }
.user-item:hover { background: rgba(245,166,35,0.035); }

.user-info { flex: 1; min-width: 0; }
.user-info .name { font-size: .84rem; font-weight: 600; margin-bottom: 2px; }
.user-info .meta { font-size: .72rem; color: var(--text-muted); }

.follow-btn {
  padding: 5px 13px; border-radius: 16px;
  font-size: .72rem; font-weight: 700;
  border: 1px solid var(--border-honey); color: var(--honey);
  transition: all var(--trans); flex-shrink: 0;
  letter-spacing: 0.01em;
}
.follow-btn:hover {
  background: rgba(245,166,35,0.09);
  box-shadow: 0 0 0 1px rgba(245,166,35,0.18);
}
.follow-btn.following {
  background: rgba(92,224,192,0.08);
  border-color: var(--mint); color: var(--mint);
}
.follow-btn.following:hover {
  background: rgba(92,224,192,0.14);
  box-shadow: 0 0 0 1px rgba(92,224,192,0.2);
}

/* ── User Filter Strip ───────────────────────────────────── */
.user-filter-strip {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  margin-bottom: 26px; scrollbar-width: none;
}
.user-filter-strip::-webkit-scrollbar { display: none; }

.user-chip {
  display: flex; align-items: center; gap: 7px; flex-shrink: 0;
  padding: 7px 14px 7px 8px; border-radius: 24px;
  border: 1px solid var(--border);
  font-size: .77rem; font-weight: 500;
  color: var(--text-muted);
  transition: all var(--trans);
  letter-spacing: 0.01em;
}
.user-chip:hover {
  border-color: var(--border-honey);
  color: var(--honey);
  background: rgba(245,166,35,0.05);
}
.user-chip.on {
  border-color: var(--border-honey);
  color: var(--honey);
  background: rgba(245,166,35,0.07);
  box-shadow: inset 0 0 0 1px rgba(245,166,35,0.1);
}
.user-chip .av {
  width: 24px; height: 24px; border-radius: 50%; font-size: .6rem;
  background: linear-gradient(145deg, var(--hive-500), var(--hive-700));
  display: flex; align-items: center; justify-content: center;
  color: var(--honey-lt); font-weight: 700;
}

/* ── Loading skeleton ────────────────────────────────────── */
@keyframes skeleton-shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg,
    rgba(245,166,35,0.04) 25%,
    rgba(245,166,35,0.08) 50%,
    rgba(245,166,35,0.04) 75%
  );
  background-size: 800px 100%;
  animation: skeleton-shimmer 1.6s ease infinite;
  border-radius: 6px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .following-layout { grid-template-columns: 1fr; }
  .sidebar-card { position: static; }
  .reviews-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">
    <div class="brand-mark">🐝</div>
    <span class="brand-name">Hive <b>Music</b></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">🏠 Home</a></li>
    <li><a href="seguiti.html" class="active">👥 Seguiti</a></li>
    <li><a href="messaggi.html">💬 Messaggi</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-wrap container">
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <h1 class="section-title">Recensioni dai Seguiti</h1>
        <p class="page-sub">Le ultime recensioni delle persone che segui</p>
      </div>
      <!--<button class="btn btn-ghost" style="font-size:.82rem;"
        onclick="showToast('Gestisci chi segui dal tuo profilo')">Gestisci seguiti</button>-->
    </div>
  </div>

  <div class="following-layout" id="following-layout">
    <div>
      <div class="user-filter-strip" id="user-strip"></div>
      <div id="feed-area"></div>
    </div>
    <div>
      <div class="sidebar-card">
        <div class="sidebar-card-head">
          <span class="sidebar-card-title">Potresti seguire</span>
          <a href="#" class="see-all">Vedi tutti</a>
        </div>
        <div id="suggestions-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="api.js?v=7"></script>
<script>
let followingList = [];
let activeUserId = 'all';
let currentUser = null;

(async function init() {
  if (!Auth.isLoggedIn()) { window.location.href = 'accedi.html'; return; }
  try { currentUser = await Auth.me(); } catch { Auth.logout(); return; }
  document.getElementById('nav-right').innerHTML = `
    <a href="recensione.html" class="btn btn-gold">＋ Recensisci</a>
    <a href="profilo.html" class="avatar" style="width:36px;height:36px;font-size:.85rem;text-decoration:none;overflow:hidden;">${avatarInner(currentUser)}</a>`;
  const [followingRes, suggestionsRes] = await Promise.allSettled([Users.following(), Users.suggestions()]);
  followingList = followingRes.status === 'fulfilled' ? (followingRes.value.users || []) : [];
  const suggestions = suggestionsRes.status === 'fulfilled' ? (suggestionsRes.value.users || []) : [];
  renderUserStrip();
  renderSuggestions(suggestions);
  await renderFeed();
})();

function renderUserStrip() {
  const strip = document.getElementById('user-strip');
  strip.innerHTML =
    `<button class="user-chip on" onclick="filterUser(this,'all')"><span style="font-size:.85rem">👥</span> Tutti</button>` +
    followingList.map(u => {
      return `<button class="user-chip" onclick="filterUser(this,${u.id})">
        <span class="av" style="overflow:hidden;">${avatarInner(u)}</span>${(u.display_name || u.username).split(' ')[0]}
      </button>`;
    }).join('');
}

function renderSuggestions(suggestions) {
  const sl = document.getElementById('suggestions-list');
  if (!suggestions.length) {
    sl.innerHTML = '<p style="padding:18px 20px;color:var(--text-dim);font-size:.82rem">Nessun suggerimento disponibile</p>';
    return;
  }
  sl.innerHTML = suggestions.map(s => {
    return `<div class="user-item">
      <a href="profilo.html?id=${s.id}" style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;color:inherit;text-decoration:none;">
        <div class="avatar" style="width:38px;height:38px;font-size:.9rem;flex-shrink:0;overflow:hidden;">${avatarInner(s)}</div>
        <div class="user-info">
          <div class="name">${s.display_name || s.username}</div>
          <div class="meta">${s.genre || ''} · ${s.followers_count ?? 0} seguaci</div>
        </div>
      </a>
      <button class="follow-btn" id="sfb-${s.id}" onclick="toggleFollow(${s.id})">Segui</button>
    </div>`;
  }).join('');
}

async function renderFeed() {
  const area = document.getElementById('feed-area');
  /* Skeleton loader */
  area.innerHTML = Array.from({length: 4}, () =>
    `<div class="review-card" style="pointer-events:none;margin-bottom:20px;">
      <div class="rc-album-header">
        <div class="skeleton" style="width:72px;height:72px;border-radius:12px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">
          <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
          <div class="skeleton" style="height:11px;width:45%;border-radius:4px"></div>
          <div class="skeleton" style="height:11px;width:55%;border-radius:4px"></div>
        </div>
      </div>
      <div class="skeleton" style="height:11px;width:90%;border-radius:4px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:11px;width:75%;border-radius:4px"></div>
    </div>`
  ).join('');

  try {
    const params = activeUserId === 'all' ? {} : { userId: activeUserId };
    const { reviews } = await Feed.get(params);
    if (!reviews || !reviews.length) {
      area.innerHTML = `<div class="empty-state">
        <span class="empty-icon">🐝</span>
        <h2 class="empty-title">Nessuna recensione</h2>
        <p class="empty-text">${activeUserId === 'all'
          ? 'Le persone che segui non hanno ancora pubblicato recensioni.'
          : 'Questo utente non ha ancora pubblicato recensioni recenti.'}</p>
      </div>`;
      return;
    }
    let html = '<div class="reviews-grid">';
    reviews.forEach((r, i) => {
      const name = r.display_name || r.username;
      const tracks = Array.isArray(r.fav_tracks_json) ? r.fav_tracks_json : [];
      html += `<article class="review-card" onclick="goDetail(${r.review_id})"
        style="animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both;animation-delay:${i * .055}s">
        <div class="rc-album-header">
          <div class="rc-cover">${r.cover_url
            ? `<img src="${r.cover_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`
            : '🎵'}</div>
          <div class="rc-album-info">
            <div class="rc-title">${r.album_title}</div>
            <div class="rc-artist">${r.artist}</div>
            <span class="rc-genre">${r.genre || ''}</span>
            <div class="rc-stars">${stars(r.rating)}</div>
          </div>
        </div>
        <div class="rc-body">
          <p class="rc-text">${r.body}</p>
          <div class="rc-tracks">${tracks.slice(0, 3).map(t => `<span class="track-pill">♪ ${t}</span>`).join('')}</div>
        </div>
        <div class="rc-footer">
          <div class="rc-user">
            <div class="avatar" style="width:28px;height:28px;font-size:.72rem;overflow:hidden;">${avatarInner(r)}</div>
            <div>
              <a href="profilo.html?id=${r.user_id}" class="rc-user-name"
                onclick="event.stopPropagation()"
                style="text-decoration:none;color:inherit;transition:color .15s"
                onmouseover="this.style.color='var(--honey)'"
                onmouseout="this.style.color=''">${name}</a>
              <div class="rc-date">${formatDate(r.created_at)}</div>
            </div>
          </div>
          <div class="rc-actions">
            <button class="action-btn" onclick="event.stopPropagation();like(${r.review_id},this)">👍 <span class="lk-${r.review_id}">${r.likes_count}</span></button>
            <button class="action-btn" onclick="event.stopPropagation();goDetail(${r.review_id})">💬 ${r.comments_count}</button>
          </div>
        </div>
      </article>`;
    });
    html += '</div>';
    area.innerHTML = html;
  } catch (err) {
    area.innerHTML = `<p style="color:var(--coral);padding:20px 0;font-size:.88rem">Errore: ${err.message}</p>`;
  }
}

function filterUser(el, uid) {
  document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeUserId = uid;
  renderFeed();
}

async function toggleFollow(id) {
  const btn = document.getElementById('sfb-' + id);
  const isNow = btn.classList.toggle('following');
  btn.textContent = '…';
  try {
    const { following } = await Users.toggleFollow(id, isNow);
    btn.textContent = following ? '✓ Seguito' : 'Segui';
    btn.classList.toggle('following', following);
    showToast(following ? 'Ora segui questo utente!' : 'Non segui più questo utente');
    const followingRes = await Users.following();
    followingList = followingRes.users || [];
    renderUserStrip();
  } catch (err) {
    btn.classList.toggle('following');
    btn.textContent = btn.classList.contains('following') ? '✓ Seguito' : 'Segui';
    showToast('Errore: ' + err.message);
  }
}

async function like(reviewId, btn) {
  if (!currentUser) { showToast('Accedi per mettere mi piace'); return; }
  const isActive = btn.classList.toggle('liked');
  try {
    const { likes_count } = await Reviews.like(reviewId, isActive ? 1 : 0);
    const span = document.querySelector(`.lk-${reviewId}`);
    if (span) span.textContent = likes_count;
  } catch (err) { btn.classList.toggle('liked'); showToast('Errore: ' + err.message); }
}

function stars(n) {
  return Array.from({length: 5}, (_, i) =>
    `<span class="star${i < n ? ' on' : ''}">★</span>`
  ).join('');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Adesso';
  if (diff < 3600) return `${Math.floor(diff / 60)} min fa`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} ore fa`;
  if (diff < 172800) return 'Ieri';
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

function goDetail(id) { sessionStorage.setItem('hm_review', id); window.location.href = 'dettaglio.html'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
