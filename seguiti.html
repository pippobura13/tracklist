<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hive Music — Seguiti</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="shared.css" />
<style>
.page-header { padding: 44px 0 0; margin-bottom: 32px; }
.page-header-inner {
  display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.page-sub { color: var(--text-muted); font-size: .88rem; margin-top: 6px; }

.following-layout {
  display: grid; grid-template-columns: 1fr 300px; gap: 36px; align-items: start;
}
.reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 30px;
  background: var(--card-bg); border: 1px dashed var(--border-md);
  border-radius: var(--radius);
}
.empty-icon { font-size: 3.8rem; margin-bottom: 18px; }
.empty-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem; font-weight: 700; margin-bottom: 10px;
}
.empty-text { color: var(--text-muted); line-height: 1.65; max-width: 320px; margin: 0 auto 24px; font-size: .9rem; }

/* Sidebar */
.sidebar-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; position: sticky; top: 86px;
}
.sidebar-card-head {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-card-title { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; }
.see-all { font-size: .76rem; color: var(--honey); }

.user-item {
  display: flex; align-items: center; gap: 12px; padding: 13px 20px;
  border-bottom: 1px solid var(--border); transition: background var(--trans);
}
.user-item:last-child { border-bottom: none; }
.user-item:hover { background: rgba(245,166,35,.03); }
.user-info { flex: 1; min-width: 0; }
.user-info .name { font-size: .85rem; font-weight: 600; margin-bottom: 1px; }
.user-info .meta { font-size: .73rem; color: var(--text-muted); }
.follow-btn {
  padding: 6px 14px; border-radius: 16px;
  font-size: .73rem; font-weight: 700;
  border: 1px solid var(--border-honey); color: var(--honey);
  transition: all var(--trans); flex-shrink: 0;
}
.follow-btn:hover { background: rgba(245,166,35,.08); }
.follow-btn.following {
  background: rgba(92,224,192,.08); border-color: var(--mint); color: var(--mint);
}

/* User filter strip */
.user-filter-strip {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  margin-bottom: 24px; scrollbar-width: none;
}
.user-filter-strip::-webkit-scrollbar { display: none; }
.user-chip {
  display: flex; align-items: center; gap: 7px; flex-shrink: 0;
  padding: 7px 14px 7px 7px; border-radius: 24px;
  border: 1px solid var(--border); font-size: .78rem; font-weight: 500;
  color: var(--text-muted); transition: all var(--trans);
}
.user-chip:hover, .user-chip.on { border-color: var(--honey); color: var(--honey); background: rgba(245,166,35,.06); }
.user-chip .av {
  width: 24px; height: 24px; border-radius: 50%; font-size: .62rem;
  background: var(--hive-500); display: flex; align-items: center; justify-content: center;
  color: var(--honey); font-weight: 700;
}

@media (max-width: 900px) {
  .following-layout { grid-template-columns: 1fr; }
  .sidebar-card { position: static; }
  .reviews-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">
    <div class="brand-mark">🐝</div>
    <span class="brand-name">Hive <b>Music</b></span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">🏠 Home</a></li>
    <li><a href="seguiti.html" class="active">👥 Seguiti</a></li>
    <li><a href="messaggi.html">💬 Messaggi</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-wrap container">
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <h1 class="section-title">Recensioni dai Seguiti</h1>
        <p class="page-sub">Le ultime recensioni delle persone che segui</p>
      </div>
      <button class="btn btn-ghost" style="font-size:.82rem;" onclick="showToast('Gestisci chi segui dal tuo profilo')">Gestisci seguiti</button>
    </div>
  </div>

  <div class="following-layout" id="following-layout">
    <div>
      <div class="user-filter-strip" id="user-strip"></div>
      <div id="feed-area"></div>
    </div>
    <div>
      <div class="sidebar-card">
        <div class="sidebar-card-head">
          <span class="sidebar-card-title">Chi seguire</span>
          <a href="#" class="see-all">Vedi tutti</a>
        </div>
        <div id="suggestions-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="api.js?v=5"></script>
<script>
let followingList = [];
let activeUserId = 'all';
let currentUser = null;

(async function init() {
  if (!Auth.isLoggedIn()) { window.location.href = 'accedi.html'; return; }
  try { currentUser = await Auth.me(); } catch { Auth.logout(); return; }
  const av = (currentUser.display_name || currentUser.username || '?')[0].toUpperCase();
  document.getElementById('nav-right').innerHTML = `
    <a href="recensione.html" class="btn btn-gold">＋ Recensisci</a>
    <a href="profilo.html" class="avatar" style="width:36px;height:36px;font-size:.85rem;text-decoration:none;">${av}</a>`;
  const [followingRes, suggestionsRes] = await Promise.allSettled([Users.following(), Users.suggestions()]);
  followingList = followingRes.status === 'fulfilled' ? (followingRes.value.users || []) : [];
  const suggestions = suggestionsRes.status === 'fulfilled' ? (suggestionsRes.value.users || []) : [];
  renderUserStrip();
  renderSuggestions(suggestions);
  await renderFeed();
})();

function renderUserStrip() {
  const strip = document.getElementById('user-strip');
  strip.innerHTML =
    `<button class="user-chip on" onclick="filterUser(this,'all')"><span style="font-size:.85rem">👥</span> Tutti</button>` +
    followingList.map(u => {
      const av = (u.display_name || u.username || '?')[0].toUpperCase();
      return `<button class="user-chip" onclick="filterUser(this,${u.id})">
        <span class="av">${av}</span>${(u.display_name || u.username).split(' ')[0]}
      </button>`;
    }).join('');
}

function renderSuggestions(suggestions) {
  const sl = document.getElementById('suggestions-list');
  if (!suggestions.length) { sl.innerHTML = '<p style="padding:18px 20px;color:var(--text-dim);font-size:.82rem">Nessun suggerimento disponibile</p>'; return; }
  sl.innerHTML = suggestions.map(s => {
    const av = (s.display_name || s.username || '?')[0].toUpperCase();
    return `<div class="user-item">
      <a href="profilo.html?id=${s.id}" style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;color:inherit;text-decoration:none;">
        <div class="avatar" style="width:38px;height:38px;font-size:.9rem;flex-shrink:0;">${av}</div>
        <div class="user-info">
          <div class="name" style="transition:color .15s">${s.display_name || s.username}</div>
          <div class="meta">${s.genre || ''} · ${s.followers_count ?? 0} seguaci</div>
        </div>
      </a>
      <button class="follow-btn" id="sfb-${s.id}" onclick="toggleFollow(${s.id})">Segui</button>
    </div>`;
  }).join('');
}

async function renderFeed() {
  const area = document.getElementById('feed-area');
  area.innerHTML = '<p style="color:var(--text-dim);font-size:.85rem;padding:20px 0">Caricamento…</p>';
  try {
    const params = activeUserId === 'all' ? {} : { userId: activeUserId };
    const { reviews } = await Feed.get(params);
    if (!reviews || !reviews.length) {
      area.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🐝</div>
        <h2 class="empty-title">Nessuna recensione</h2>
        <p class="empty-text">${activeUserId === 'all' ? 'Le persone che segui non hanno ancora pubblicato recensioni.' : 'Questo utente non ha ancora pubblicato recensioni recenti.'}</p>
      </div>`;
      return;
    }
    let html = '<div class="reviews-grid">';
    reviews.forEach((r, i) => {
      const av = (r.display_name || r.username || '?')[0].toUpperCase();
      const name = r.display_name || r.username;
      const tracks = Array.isArray(r.fav_tracks_json) ? r.fav_tracks_json : [];
      html += `<article class="review-card" onclick="goDetail(${r.review_id})" style="animation:fadeUp .35s ease both;animation-delay:${i*.05}s">
        <div class="rc-album-header">
          <div class="rc-cover">${r.cover_url ? `<img src="${r.cover_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">` : '🎵'}</div>
          <div class="rc-album-info">
            <div class="rc-title">${r.album_title}</div>
            <div class="rc-artist">${r.artist}</div>
            <span class="rc-genre">${r.genre || ''}</span>
            <div class="rc-stars">${stars(r.rating)}</div>
          </div>
        </div>
        <div class="rc-body">
          <p class="rc-text">${r.body}</p>
          <div class="rc-tracks">${tracks.slice(0,3).map(t=>`<span class="track-pill">♪ ${t}</span>`).join('')}</div>
        </div>
        <div class="rc-footer">
          <div class="rc-user">
            <div class="avatar" style="width:28px;height:28px;font-size:.73rem;">${av}</div>
            <div>
              <a href="profilo.html?id=${r.user_id}" class="rc-user-name"
                onclick="event.stopPropagation()"
                style="text-decoration:none;color:inherit;cursor:pointer;transition:color .15s"
                onmouseover="this.style.color='var(--honey)'"
                onmouseout="this.style.color=''">${name}</a>
              <div class="rc-date">${formatDate(r.created_at)}</div>
            </div>
          </div>
          <div class="rc-actions">
            <button class="action-btn" onclick="event.stopPropagation();like(${r.review_id},this)">👍 <span class="lk-${r.review_id}">${r.likes_count}</span></button>
            <button class="action-btn" onclick="event.stopPropagation();goDetail(${r.review_id})">💬 ${r.comments_count}</button>
          </div>
        </div>
      </article>`;
    });
    html += '</div>';
    area.innerHTML = html;
  } catch (err) { area.innerHTML = `<p style="color:var(--coral);padding:20px 0">Errore: ${err.message}</p>`; }
}

function filterUser(el, uid) {
  document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeUserId = uid;
  renderFeed();
}

async function toggleFollow(id) {
  const btn = document.getElementById('sfb-' + id);
  const isNow = btn.classList.toggle('following');
  btn.textContent = isNow ? '…' : 'Segui';
  try {
    const { following } = await Users.toggleFollow(id, isNow);
    btn.textContent = following ? '✓ Seguito' : 'Segui';
    btn.classList.toggle('following', following);
    showToast(following ? 'Ora segui questo utente!' : 'Non segui più questo utente');
    const followingRes = await Users.following();
    followingList = followingRes.users || [];
    renderUserStrip();
  } catch (err) {
    btn.classList.toggle('following');
    btn.textContent = btn.classList.contains('following') ? '✓ Seguito' : 'Segui';
    showToast('Errore: ' + err.message);
  }
}

async function like(reviewId, btn) {
  if (!currentUser) { showToast('Accedi per mettere mi piace'); return; }
  const isActive = btn.classList.toggle('liked');
  try {
    const { likes_count } = await Reviews.like(reviewId, isActive ? 1 : 0);
    const span = document.querySelector(`.lk-${reviewId}`);
    if (span) span.textContent = likes_count;
  } catch (err) { btn.classList.toggle('liked'); showToast('Errore: ' + err.message); }
}

function stars(n) { return Array.from({length:5}, (_,i) => `<span class="star${i<n?' on':''}">★</span>`).join(''); }
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Adesso';
  if (diff < 3600) return `${Math.floor(diff/60)} min fa`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ore fa`;
  if (diff < 172800) return 'Ieri';
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'short' });
}
function goDetail(id) { sessionStorage.setItem('hm_review', id); window.location.href = 'dettaglio.html'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
